name: Push image to image registery

permissions: write-all

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
env:
  IMAGE_NAME: local-renewable-service
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Define version and repository owner
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="${{ github.head_ref }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[A-Z]' '[a-z]')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "REPO_OWNER=${REPO_OWNER}" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          labels: |
            runnumber=${{ github.run_id }}
